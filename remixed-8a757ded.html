<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Arsenal CRS">
<meta name="theme-color" content="#06000f">
<title>Arsenal CRS · Alpha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#06000f; --s1:#0e0020; --s2:#17003a;
  --border:#3a006e; --border2:#6600cc;
  --text:#ede6ff; --muted:#9b7ec8;
  --purple:#b533ff; --glow:#c450ff;
  --green:#00ffaa; --red:#ff2255;
  --orange:#ff6600; --blue:#44ccff;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Rajdhani',system-ui,sans-serif;overflow:hidden;}
body::before{content:'';position:fixed;top:-40%;left:-20%;width:60%;height:80%;background:radial-gradient(ellipse,rgba(120,0,255,.16) 0%,transparent 70%);pointer-events:none;z-index:0;animation:a1 9s ease-in-out infinite alternate;}
@keyframes a1{0%{transform:scale(1)}100%{transform:translate(4%,3%) scale(1.07)}}

/* ── HEADER ── */
header{position:relative;z-index:10;background:linear-gradient(180deg,rgba(14,0,32,.99),rgba(10,0,22,.96));border-bottom:1px solid var(--border2);padding:10px 14px;padding-top:max(env(safe-area-inset-top),10px);box-shadow:0 0 28px rgba(100,0,220,.3);}
.htop{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.logo{width:38px;height:38px;background:linear-gradient(135deg,#7b00ff,#c450ff);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 0 14px rgba(180,80,255,.5);}
.htitle{font-family:'Black Ops One',system-ui,sans-serif;font-size:19px;letter-spacing:2px;background:linear-gradient(90deg,#c450ff,#ede6ff 55%,#c450ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hsub{font-size:11px;color:var(--muted);letter-spacing:1.5px;font-weight:700;}
.hbtn{margin-left:auto;background:rgba(100,0,200,.3);border:1px solid var(--border2);border-radius:8px;padding:6px 10px;color:var(--glow);font-size:11px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:1px;cursor:pointer;white-space:nowrap;}

/* ── SEARCH ── */
.sw{position:relative;}
#si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--purple);pointer-events:none;}
#searchInput{width:100%;background:rgba(23,0,58,.7);border:1px solid var(--border2);border-radius:10px;padding:9px 38px 9px 36px;color:var(--text);font-size:16px;font-family:'Rajdhani',sans-serif;font-weight:600;outline:none;-webkit-appearance:none;letter-spacing:.4px;transition:border-color .2s,box-shadow .2s;}
#searchInput:focus{border-color:var(--glow);box-shadow:0 0 0 2px rgba(180,80,255,.2),inset 0 0 16px rgba(100,0,200,.1);}
#searchInput::placeholder{color:var(--muted);font-family:'Rajdhani',sans-serif;font-weight:600;}
.cb{position:absolute;right:9px;top:50%;transform:translateY(-50%);background:var(--border2);border:none;border-radius:50%;width:20px;height:20px;color:#fff;font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center;}
.cb.show{display:flex;}

/* ── FILTERS ── */
.filters{display:flex;gap:6px;margin-top:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.filters::-webkit-scrollbar{display:none;}
.fb{flex-shrink:0;padding:4px 12px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-size:11px;font-family:'Rajdhani',sans-serif;font-weight:700;cursor:pointer;white-space:nowrap;letter-spacing:1px;text-transform:uppercase;transition:all .15s;}
.fb.active{background:rgba(120,0,255,.3);border-color:var(--glow);color:var(--glow);box-shadow:0 0 8px rgba(180,80,255,.25);}

/* ── RESULTS ── */
#results{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px 0 env(safe-area-inset-bottom,16px);position:relative;z-index:1;}
#results::-webkit-scrollbar{width:3px;}
#results::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.empty{text-align:center;color:var(--muted);padding:60px 20px;}
.empty-icon{font-size:50px;margin-bottom:12px;}
.empty p{font-size:15px;font-weight:600;letter-spacing:.5px;line-height:1.7;}
.rc{font-size:10px;color:var(--muted);padding:4px 14px 5px;letter-spacing:2px;text-transform:uppercase;font-weight:700;}

/* ── CARD ── */
.card{margin:4px 10px;border-radius:11px;overflow:hidden;cursor:pointer;background:linear-gradient(135deg,rgba(14,0,32,.96),rgba(20,0,45,.92));border:1px solid var(--border);border-left:3px solid var(--border);animation:fi .16s ease;transition:border-color .15s,box-shadow .15s;}
.card.open{border-color:var(--border2);box-shadow:0 0 18px rgba(100,0,200,.2);}
.card.edited{border-left-color:var(--glow)!important;}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.ch{padding:10px 12px;display:flex;align-items:flex-start;gap:8px;}
.cm{flex:1;min-width:0;}
.mn{font-size:14px;font-weight:700;line-height:1.3;letter-spacing:.2px;}
.ms{font-size:10px;color:var(--muted);margin-top:1px;letter-spacing:1.2px;font-weight:700;}
.badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;}
.badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700;border:1px solid;white-space:nowrap;letter-spacing:.6px;text-transform:uppercase;}
.bg{color:var(--green);border-color:rgba(0,255,170,.3);background:rgba(0,255,170,.07);}
.br{color:var(--red);border-color:rgba(255,34,85,.3);background:rgba(255,34,85,.07);}
.bo{color:var(--orange);border-color:rgba(255,102,0,.3);background:rgba(255,102,0,.07);}
.bb{color:var(--blue);border-color:rgba(68,204,255,.3);background:rgba(68,204,255,.07);}
.bk{color:var(--muted);border-color:rgba(155,126,200,.2);background:transparent;}
.bx{color:var(--glow);border-color:rgba(196,80,255,.4);background:rgba(196,80,255,.08);}
.chev{color:var(--border2);font-size:16px;margin-top:1px;transition:transform .2s,color .15s;flex-shrink:0;}
.card.open .chev{transform:rotate(90deg);color:var(--glow);}

/* ── DETAIL ── */
.cd{display:none;border-top:1px solid var(--border);padding:10px 12px;flex-direction:column;gap:8px;}
.card.open .cd{display:flex;}
.dr{display:flex;gap:8px;align-items:flex-start;}
.dl{font-size:10px;color:var(--muted);min-width:72px;flex-shrink:0;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding-top:2px;}
.dv{font-size:13px;flex:1;font-weight:600;line-height:1.4;}
.lb{background:rgba(23,0,58,.9);border-radius:8px;padding:10px 11px;border:1px solid var(--border2);box-shadow:inset 0 0 16px rgba(80,0,160,.15);}
.ln{font-size:10px;color:var(--glow);font-weight:700;margin-bottom:7px;letter-spacing:1.5px;text-transform:uppercase;}
.lg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;}
.li{background:rgba(10,0,22,.7);border-radius:6px;padding:6px 9px;border:1px solid var(--border);}
.lk{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:700;}
.lv{font-size:15px;font-weight:700;margin-top:2px;}
.ctb{background:rgba(0,255,170,.05);border:1px solid rgba(0,255,170,.25);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--green);font-weight:700;}
.reb{background:rgba(255,102,0,.05);border:1px solid rgba(255,102,0,.25);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--orange);font-weight:600;line-height:1.5;}
.kab{background:rgba(155,126,200,.05);border:1px solid rgba(155,126,200,.18);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--muted);font-weight:600;}
.editbtn{margin-top:4px;width:100%;background:rgba(100,0,200,.2);border:1px solid var(--border2);border-radius:8px;padding:8px;color:var(--glow);font-size:12px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:1px;cursor:pointer;text-align:center;transition:background .15s;}
.editbtn:active{background:rgba(100,0,200,.4);}

/* ── EDIT SHEET ── */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;backdrop-filter:blur(3px);}
#overlay.show{display:block;}
#editSheet{
  position:fixed;bottom:0;left:0;right:0;z-index:101;
  background:linear-gradient(180deg,#0e0025,#0a0018);
  border-top:2px solid var(--border2);
  border-radius:20px 20px 0 0;
  padding:0 0 env(safe-area-inset-bottom,16px);
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.32,.72,0,1);
  box-shadow:0 -8px 40px rgba(100,0,220,.4);
  max-height:90vh;overflow-y:auto;
}
#editSheet.open{transform:translateY(0);}
.es-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 4px;}
.es-head{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 12px;border-bottom:1px solid var(--border);}
.es-title{font-family:'Black Ops One',system-ui,sans-serif;font-size:14px;letter-spacing:2px;color:var(--glow);}
.es-name{font-size:12px;color:var(--muted);font-weight:700;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.es-body{padding:14px 16px;display:flex;flex-direction:column;gap:12px;}
.frow{display:flex;flex-direction:column;gap:4px;}
.flabel{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:1.2px;text-transform:uppercase;}
.finput{background:rgba(23,0,58,.8);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);font-size:14px;font-family:'Rajdhani',sans-serif;font-weight:600;outline:none;width:100%;-webkit-appearance:none;transition:border-color .15s;}
.finput:focus{border-color:var(--glow);}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fselect{background:rgba(23,0,58,.8);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:'Rajdhani',sans-serif;font-weight:600;outline:none;width:100%;-webkit-appearance:none;appearance:none;}
/* toggle */
.trow{display:flex;align-items:center;justify-content:space-between;}
.tlabel{font-size:13px;font-weight:700;color:var(--text);}
.toggle{position:relative;width:44px;height:24px;}
.toggle input{opacity:0;width:0;height:0;}
.tslider{position:absolute;inset:0;background:rgba(60,0,120,.5);border-radius:12px;border:1px solid var(--border2);transition:.2s;}
.tslider:before{content:'';position:absolute;left:3px;top:3px;width:16px;height:16px;background:var(--muted);border-radius:50%;transition:.2s;}
.toggle input:checked+.tslider{background:rgba(0,255,170,.2);border-color:var(--green);}
.toggle input:checked+.tslider:before{transform:translateX(20px);background:var(--green);}
/* bottom buttons */
.es-btns{display:flex;gap:10px;padding:10px 16px 4px;border-top:1px solid var(--border);}
.btn-save{flex:1;background:linear-gradient(135deg,#7b00ff,#c450ff);border:none;border-radius:10px;padding:12px;color:#fff;font-size:14px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:1px;cursor:pointer;box-shadow:0 0 16px rgba(180,80,255,.4);}
.btn-cancel{background:rgba(60,0,120,.3);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;color:var(--muted);font-size:14px;font-family:'Rajdhani',sans-serif;font-weight:700;cursor:pointer;}
.btn-del{background:rgba(255,34,85,.1);border:1px solid rgba(255,34,85,.3);border-radius:10px;padding:12px 14px;color:var(--red);font-size:14px;cursor:pointer;}

/* ── EXPORT MODAL ── */
#expModal{position:fixed;inset:0;z-index:200;display:none;align-items:flex-end;}
#expModal.show{display:flex;}
.expBox{background:#0e0025;border-top:2px solid var(--border2);border-radius:20px 20px 0 0;padding:16px;width:100%;box-shadow:0 -8px 40px rgba(100,0,220,.4);padding-bottom:env(safe-area-inset-bottom,16px);}
.expTitle{font-family:'Black Ops One',sans-serif;font-size:14px;letter-spacing:2px;color:var(--glow);margin-bottom:10px;}
.expTa{width:100%;background:rgba(0,0,0,.5);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:11px;padding:10px;height:120px;font-family:monospace;outline:none;resize:none;}
.expBtns{display:flex;gap:8px;margin-top:10px;}
.exp-copy{flex:1;background:linear-gradient(135deg,#7b00ff,#c450ff);border:none;border-radius:8px;padding:10px;color:#fff;font-size:13px;font-family:'Rajdhani',sans-serif;font-weight:700;cursor:pointer;}
.exp-close{background:rgba(60,0,120,.3);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--muted);font-size:13px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;}
.exp-import{background:rgba(0,255,170,.1);border:1px solid rgba(0,255,170,.3);border-radius:8px;padding:10px 14px;color:var(--green);font-size:13px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;}
.edited-count{font-size:11px;color:var(--muted);margin-top:6px;font-weight:600;}
</style>
</head>
<body>
<header id="ah">
  <div class="htop">
    <div class="logo">⚡</div>
    <div>
      <div class="htitle">ARSENAL CRS</div>
      <div class="hsub" id="tc">Cargando...</div>
    </div>
    <button class="hbtn" onclick="openExport()">⬆ SYNC</button>
  </div>
  <div class="sw">
    <span id="si">🔍</span>
    <input id="searchInput" type="search" placeholder="Buscar medicamento, código..." autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="cb" id="cb" onclick="cls()">✕</button>
  </div>
  <div class="filters">
    <button class="fb" id="f0" onclick="tf(0)">✦ Disponibles</button>
    <button class="fb" id="f1" onclick="tf(1)">⚠ Alto Riesgo</button>
    <button class="fb" id="f2" onclick="tf(2)">◈ Con Ubicación</button>
    <button class="fb" id="f3" onclick="tf(3)">🔒 Controlados</button>
    <button class="fb" id="f4" onclick="tf(4)">✏ Editados</button>
    <button class="fb" id="f5" onclick="tf(5)" style="border-color:rgba(244,114,182,.5);color:#f472b6;">🫀 Cardiovascular</button>
    <button class="fb" id="f6" onclick="tf(6)" style="border-color:rgba(251,191,36,.5);color:#fbbf24;">💊 General</button>
    <button class="fb" id="f7" onclick="tf(7)" style="border-color:rgba(167,139,250,.5);color:#a78bfa;">🧠 Salud Mental</button>
    <button class="fb" id="f8" onclick="tf(8)" style="border-color:rgba(155,126,200,.4);color:#9b7ec8;">📦 Kardex</button>
  </div>
</header>

<div id="results"></div>

<!-- EDIT SHEET -->
<div id="overlay" onclick="closeEditor()"></div>
<div id="editSheet">
  <div class="es-handle"></div>
  <div class="es-head">
    <div>
      <div class="es-title">EDITAR UBICACIÓN</div>
      <div class="es-name" id="esName">—</div>
    </div>
  </div>
  <div class="es-body">
    <div class="frow">
      <div class="flabel">Estantería</div>
      <select class="fselect finput" id="eEst">
        <option value="">— Sin ubicación (Kardex) —</option>
        <option value="Estantería Cardiovascular">Estantería Cardiovascular</option>
        <option value="Estantería General">Estantería General</option>
        <option value="Carro de Salud Mental">Carro de Salud Mental</option>
        <option value="Controlados (Oficina QF)">Controlados (Oficina QF)</option>
        <option value="Refrigerador Insulinas">❄ Refrigerador Insulinas</option>
        <option value="Caja Colirios/Gotas">💧 Caja Colirios/Gotas</option>
        <option value="Otro">Otro (ver notas)</option>
      </select>
    </div>
    <div class="frow2">
      <div class="frow">
        <div class="flabel">Fila</div>
        <input class="finput" id="eFila" type="text" placeholder="ej: 3" inputmode="decimal">
      </div>
      <div class="frow">
        <div class="flabel">Columna</div>
        <input class="finput" id="eCol" type="text" placeholder="ej: 7" inputmode="decimal">
      </div>
    </div>
    <div class="frow2">
      <div class="frow">
        <div class="flabel">Presentación</div>
        <input class="finput" id="ePres" type="text" placeholder="ej: 30 comp">
      </div>
      <div class="frow">
        <div class="flabel">Color etiqueta</div>
        <select class="fselect finput" id="eColor">
          <option value="">Sin color</option>
          <option value="rosado">🩷 Rosado</option>
          <option value="celeste">🩵 Celeste</option>
          <option value="amarillo">💛 Amarillo</option>
          <option value="dorado">🟡 Dorado</option>
          <option value="verde">💚 Verde</option>
        </select>
      </div>
    </div>
    <div class="trow">
      <span class="tlabel">Disponible</span>
      <label class="toggle"><input type="checkbox" id="eDisp"><span class="tslider"></span></label>
    </div>
    <div class="frow">
      <div class="flabel">Restricción (opcional)</div>
      <input class="finput" id="eRestr" type="text" placeholder="Especialidad o condición">
    </div>
  </div>
  <div class="es-btns">
    <button class="btn-del" onclick="resetEdit()" title="Restaurar original">↺</button>
    <button class="btn-cancel" onclick="closeEditor()">Cancelar</button>
    <button class="btn-save" onclick="saveEditor()">⚡ GUARDAR</button>
  </div>
</div>

<!-- EXPORT MODAL -->
<div id="expModal" onclick="if(event.target===this)closeExport()">
  <div class="expBox">
    <div class="expTitle">SYNC / EXPORTAR</div>
    <div class="edited-count" id="expCount"></div>
    <textarea class="expTa" id="expTa" readonly></textarea>
    <div class="expBtns">
      <button class="exp-copy" onclick="copyExp()">📋 Copiar JSON</button>
      <button class="exp-import" onclick="importMode()">📥 Importar</button>
      <button class="exp-close" onclick="closeExport()">Cerrar</button>
    </div>
  </div>
</div>

var STORE_KEY='ars_edits_v1';
function getEdits(){try{return JSON.parse(localStorage.getItem(STORE_KEY)||'{}');}catch(e){return {};}}
function saveEdits(obj){try{localStorage.setItem(STORE_KEY,JSON.stringify(obj));}catch(e){}}
function entryKey(m){return (m.codigo||'')+'|'+(m.estanteria||'')+'|'+(m.fila||'')+'|'+(m.columnas||'');}

// Apply saved edits to M array
function applyEdits(arr){
  var ed=getEdits();
  return arr.map(function(m){
    var k=entryKey(m);
    if(ed[k]){var r=Object.assign({},m,ed[k]);r._edited=true;r._key=k;return r;}
    return m;
  });
}

    else if(ic){ul='<div class="ctb">🔒 Controlado — solicitar al QF directamente</div>';}
    else{ul='<div class="lb"><div class="ln">⬡ '+m.estanteria+'</div><div class="lg"><div class="li"><div class="lk">Fila</div><div class="lv">'+(m.fila||'—')+'</div></div><div class="li"><div class="lk">Columna</div><div class="lv">'+(m.columnas||'—')+'</div></div><div class="li"><div class="lk">Pack</div><div class="lv" style="font-size:12px">'+(m.presentacion||'Unitario')+'</div></div></div></div>';}
    var rr=m.restriccion?'<div class="dr"><span class="dl">Restr.</span><div style="flex:1"><div class="reb">⚡ '+m.restriccion+'</div></div></div>':'';
    var mk=entryKey(m);
    h+='<div class="card'+(m._edited?' edited':'')+'" style="border-left-color:'+bc+'" onclick="tc(this)">'
      +'<div class="ch"><div class="cm">'
      +'<div class="mn">'+hl(m.nombre,q)+'</div>'
      +'<div class="ms">'+m.codigo+'</div>'
      +'<div class="badges">'+db+rb+pb+clb+ub+kb+eb+'</div>'
      +'</div><span class="chev">›</span></div>'
      +'<div class="cd">'
      +'<div class="dr"><span class="dl">Subgrupo</span><span class="dv">'+(m.subgrupo||'—')+'</span></div>'
      +'<div class="dr"><span class="dl">Ubicación</span><div style="flex:1">'+ul+'</div></div>'
      +rr
      +'<button class="editbtn" onclick="event.stopPropagation();openEditor(\''+mk.replace(/'/g,"\\'")+'\')" >✏ Editar ubicación</button>'
      +'</div></div>';
  });
  el.innerHTML=h;el.scrollTop=0;
}

function tc(c){c.classList.toggle('open');ch();}

/* ══ EDITOR ══ */
function openEditor(key){
  curKey=key;
  var m=MD.find(function(x){return entryKey(x)===key;})||M.find(function(x){return entryKey(x)===key;});
  if(!m)return;
  document.getElementById('esName').textContent=m.nombre;
  document.getElementById('eEst').value=m.estanteria||'';
  document.getElementById('eFila').value=m.fila||'';
  document.getElementById('eCol').value=m.columnas||'';
  document.getElementById('ePres').value=m.presentacion||'';
  document.getElementById('eColor').value=m.color_etiqueta||'';
  document.getElementById('eDisp').checked=m.disponible!==false;
  document.getElementById('eRestr').value=m.restriccion||'';
  document.getElementById('overlay').classList.add('show');
  document.getElementById('editSheet').classList.add('open');
}
function closeEditor(){
  document.getElementById('editSheet').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  curKey=null;
}
function saveEditor(){
  if(!curKey)return;
  var ed=getEdits();
  var est=document.getElementById('eEst').value;
  ed[curKey]={
    estanteria:est||null,
    fila:document.getElementById('eFila').value||null,
    columnas:document.getElementById('eCol').value||null,
    presentacion:document.getElementById('ePres').value||null,
    color_etiqueta:document.getElementById('eColor').value||null,
    disponible:document.getElementById('eDisp').checked,
    restriccion:document.getElementById('eRestr').value||null,
    kardex:!est
  };
  saveEdits(ed);
  closeEditor();
  var ec=Object.keys(ed).length;
  document.getElementById('tc').textContent=MD.length+' medicamentos · '+ec+' editados localmente';
  render(LQ);
}
function resetEdit(){
  if(!curKey)return;
  if(!confirm('¿Restaurar al valor original de base de datos?'))return;
  var ed=getEdits();
  delete ed[curKey];
  saveEdits(ed);
  closeEditor();
  render(LQ);
}

/* ══ EXPORT / IMPORT ══ */
function openExport(){
  var ed=getEdits();
  var keys=Object.keys(ed);
  document.getElementById('expCount').textContent=keys.length+' entrada'+(keys.length!==1?'s':'')+' modificadas localmente';
  document.getElementById('expTa').value=keys.length>0?JSON.stringify(ed,null,2):'// Sin cambios locales todavía.\n// Edita ubicaciones y aparecerán aquí.';
  document.getElementById('expTa').readOnly=true;
  document.getElementById('expModal').classList.add('show');
}
function closeExport(){document.getElementById('expModal').classList.remove('show');}
function copyExp(){
  var ta=document.getElementById('expTa');
  ta.select();
  try{document.execCommand('copy');alert('✓ JSON copiado — comparte con tu equipo por WhatsApp');}
  catch(e){alert('Selecciona el texto manualmente y cópialo');}
}
function importMode(){
  document.getElementById('expTa').readOnly=false;
  document.getElementById('expTa').value='';
  document.getElementById('expTa').placeholder='Pega aquí el JSON recibido y toca Importar de nuevo...';
  document.querySelector('.exp-import').textContent='✓ APLICAR JSON';
  document.querySelector('.exp-import').onclick=applyImport;
}
function applyImport(){
  try{
    var data=JSON.parse(document.getElementById('expTa').value);
    var current=getEdits();
    Object.assign(current,data);
    saveEdits(current);
    closeExport();
    render(LQ);
    var ec=Object.keys(current).length;
    document.getElementById('tc').textContent=MD.length+' medicamentos · '+ec+' editados localmente';
    alert('✓ '+Object.keys(data).length+' cambios importados correctamente');
  }catch(e){alert('Error en el JSON. Verifica que sea válido.');}
}

/* ── INIT ── */
render('');
</script>

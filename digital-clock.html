<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Digital Clock</title>\n    <style>\n        body {\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            justify-content: center;\n            height: 100vh;\n            background-color: #f0f0f0;\n            font-family: Arial, sans-serif;\n        }\n        .clock {\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            border: 2px solid #333;\n            border-radius: 8px;\n            padding: 20px;\n            background: white;\n            box-shadow: 0 0 10px rgba(0,0,0,0.1);\n        }\n        .timezone {\n            font-size: 1.5em;\n            margin: 10px 0;\n        }\n        .time {\n            font-size: 2em;\n            margin: 10px 0;\n        }\n        @media (max-width: 600px) {\n            .clock {\n                width: 90%;\n            }\n        }\n    </style>\n</head>\n<body>\n    <div class="clock">\n        <div class="timezone">UTC</div>\n        <div class="time" id="utcTime"></div>\n    </div>\n    <div class="clock">\n        <div class="timezone">America/New_York</div>\n        <div class="time" id="nyTime"></div>\n    </div>\n    <div class="clock">\n        <div class="timezone">Europe/London</div>\n        <div class="time" id="londonTime"></div>\n    </div>\n    <div class="clock">\n        <div class="timezone">Asia/Tokyo</div>\n        <div class="time" id="tokyoTime"></div>\n    </div>\n    <div class="clock">\n        <div class="timezone">America/Los_Angeles</div>\n        <div class="time" id="laTime"></div>\n    </div>\n    <div class="clock">\n        <div class="timezone">Australia/Sydney</div>\n        <div class="time" id="sydneyTime"></div>\n    </div>\n    <script>\n        function updateClocks() {\n            const options = {\n                hour: '2-digit',\n                minute: '2-digit',\n                second: '2-digit',\n                timeZoneName: 'short',\n                hour12: false\n            };\n            document.getElementById('utcTime').innerHTML = new Date().toLocaleString('en-US', {timeZone: 'UTC', ...options});\n            document.getElementById('nyTime').innerHTML = new Date().toLocaleString('en-US', {timeZone: 'America/New_York', ...options});\n            document.getElementById('londonTime').innerHTML = new Date().toLocaleString('en-US', {timeZone: 'Europe/London', ...options});\n            document.getElementById('tokyoTime').innerHTML = new Date().toLocaleString('en-US', {timeZone: 'Asia/Tokyo', ...options});\n            document.getElementById('laTime').innerHTML = new Date().toLocaleString('en-US', {timeZone: 'America/Los_Angeles', ...options});\n            document.getElementById('sydneyTime').innerHTML = new Date().toLocaleString('en-US', {timeZone: 'Australia/Sydney', ...options});\n        }\n        setInterval(updateClocks, 1000);\n        updateClocks(); // initial call to set the time immediately\n    </script>\n</body>\n</html>
